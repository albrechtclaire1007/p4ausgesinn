<!DOCTYPE html> <html lang="lb"> <head> <meta charset="utf-8"/> <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/> <title>P4 – Ausgesinn</title> <style> @font-face{ font-family:'Schoulschrëft'; src:url('https://raw.githubusercontent.com/albrechtclaire1007/schoulschreft/main/schoulschreft_bold%5B2%5D.TTF') format('truetype'); font-weight:bold; font-style:normal; font-display:swap; } :root{ /* P4 (matching your provided style) */ --bg1:#E9DDF7; --bg2:#C9B3EE; --bar:#B8A3E8; --barBorder:#8E73D6; --ink:#1f1f1f; --white:#fff; --border:3px; --shadow:0 10px 24px rgba(0,0,0,.08); --pad:clamp(10px,2.2vw,16px); --r:18px; --iconArrow:"https://i.postimg.cc/k6VtHrh0/p4arrow.png"; --iconPlay:"https://i.postimg.cc/WFDJyRHR/p4play.png"; --iconReplay:"https://i.postimg.cc/BL81zWVs/p4replay.png"; } *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; outline:none;} html,body{ height:100%; margin:0; background:linear-gradient(135deg,var(--bg2),var(--bg1)); color:var(--ink); font-family:'Schoulschrëft', Arial, sans-serif; } .topBar{ position:sticky; top:10px; z-index:10; width:min(1200px,96vw); margin:10px auto 0; background:var(--bar); border:var(--border) solid var(--barBorder); border-radius:999px; box-shadow:var(--shadow); padding:10px 12px; display:grid; grid-template-columns: 70px 1fr auto; align-items:center; gap:10px; } .barBtn{ border:none; background:transparent; cursor:pointer; display:grid; place-items:center; width:54px; height:54px; } .barBtn:active{transform:scale(.98);} .barBtn img{width:46px; height:46px; object-fit:contain;} .barBtn.back img{transform:rotate(180deg);} .barTitle{ text-align:center; color:#fff; font-size:clamp(1.5rem,3.2vw,2.4rem); margin:0; line-height:1.1; padding:0 6px; } .barRight{display:flex; align-items:center; gap:6px;} .barRight .barBtn{width:50px; height:50px;} .barRight .barBtn img{width:42px; height:42px;} .wrap{ width:min(1200px,96vw); margin:18px auto 26px; padding:var(--pad); display:flex; flex-direction:column; gap:14px; } .card{ background:rgba(255,255,255,.8); border:var(--border) solid rgba(255,255,255,.65); border-radius:var(--r); box-shadow:var(--shadow); padding:clamp(12px,2.2vw,18px); } .cardTitle{margin:0 0 8px 0; font-size:clamp(1.1rem,2.2vw,1.5rem); opacity:.9;} .placeholder{border:3px dashed rgba(0,0,0,.2); border-radius:14px; padding:18px; background:rgba(255,255,255,.55); font-size:1.05rem; opacity:.85;} </style> </head> <body> <div class="topBar"> <button class="barBtn back" id="prev" aria-label="Virdrun"> <img src="https://i.postimg.cc/k6VtHrh0/p4arrow.png" alt=""> </button> <h1 class="barTitle" id="gameTitle">D'Ausgesinn</h1> <div class="barRight"> <button class="barBtn" id="play" aria-label="Play"> <img src="https://i.postimg.cc/WFDJyRHR/p4play.png" alt=""> </button> <button class="barBtn" id="replay" aria-label="Replay"> <img src="https://i.postimg.cc/BL81zWVs/p4replay.png" alt=""> </button> <button class="barBtn" id="next" aria-label="Nächst"> <img src="https://i.postimg.cc/k6VtHrh0/p4arrow.png" alt=""> </button> </div> </div> <div class="wrap"> <div class="card"> <div id="topMeta" style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;"> <div id="exerciseDots" style="display:flex;gap:8px;align-items:center;"></div> <div id="progressText" style="font-size:clamp(1rem,2vw,1.2rem);opacity:.85;"></div> </div> </div> <div class="card"> <div id="mainArea" style="min-height:62vh;"></div> </div> </div> <script> const AUDIO_BASE = "https://github.com/albrechtclaire1007/p4ausgesinn/raw/refs/heads/main/"; const VOCAB = [ {word:"al", img:"https://i.postimg.cc/NKMWg79Q/al.png", audio:AUDIO_BASE+"p4_al.mp3", type:"person"}, {word:"déck", img:"https://i.postimg.cc/qNR9kXhv/deck.png", audio:AUDIO_BASE+"p4_deck.mp3", type:"person"}, {word:"dënn", img:"https://i.postimg.cc/3kRPKC4y/denn.png", audio:AUDIO_BASE+"p4_denn.mp3", type:"person"}, {word:"grouss", img:"https://i.postimg.cc/9DMvWtRF/grouss.png", audio:AUDIO_BASE+"p4_grouss.mp3", type:"person"}, {word:"jonk", img:"https://i.postimg.cc/Hrxfp4cV/jonk.png", audio:AUDIO_BASE+"p4_jonk.mp3", type:"person"}, {word:"kleng", img:"https://i.postimg.cc/fVL6wjtW/kleng.png", audio:AUDIO_BASE+"p4_kleng.mp3", type:"person"}, {word:"blond", img:"https://i.postimg.cc/xkKr7jNW/Blond-1.png", audio:null, type:"hairColor"}, {word:"brong", img:"https://i.postimg.cc/7GwvyvgD/brong.png", audio:null, type:"hairColor"}, {word:"glat", img:"https://i.postimg.cc/zb8m1mnN/Glat.png", audio:AUDIO_BASE+"p4_glat.mp3", type:"hairTexture"}, {word:"krauseleg", img:"https://i.postimg.cc/5YbcMcwb/Krauseleg.png", audio:AUDIO_BASE+"p4_krauseleg.mp3", type:"hairTexture"}, {word:"kuerz", img:"https://i.postimg.cc/7Gwvyvgk/Kuerz.png", audio:AUDIO_BASE+"p4_kuerz.mp3", type:"hairLength"}, {word:"laang", img:"https://i.postimg.cc/5YbcMcw2/Laang.png", audio:AUDIO_BASE+"p4_laang.mp3", type:"hairLength"}, {word:"rout", img:"https://i.postimg.cc/Q9hLrLpx/rout.png", audio:AUDIO_BASE+"p4_rout.mp3", type:"hairColor"}, {word:"schwaarz", img:"https://i.postimg.cc/YGMcwc1S/schwaarz.png", audio:AUDIO_BASE+"p4_schwaarz.mp3", type:"hairColor"} ]; const PERSON_WORDS = ["al","jonk","grouss","kleng","déck","dënn"]; const LENGTH_WORDS = ["kuerz","laang"]; const TEXTURE_WORDS = ["glat","krauseleg"]; const COLOR_WORDS = ["blond","brong","rout","schwaarz"]; const BUILD_PROMPTS = [ {person:"jonk", length:"laang", texture:"glat", color:"blond", text:["Si ass jonk.","Si huet laang, glat, blond Hoer."]}, {person:"al", length:"kuerz", texture:"krauseleg", color:"rout", text:["Hatt ass al.","Hatt huet kuerz, krauseleg, rout Hoer."]}, {person:"grouss", length:"laang", texture:"krauseleg", color:"schwaarz", text:["Hien ass grouss.","Hien huet laang, krauseleg, schwaarz Hoer."]}, {person:"kleng", length:"kuerz", texture:"glat", color:"brong", text:["Si ass kleng.","Si huet kuerz, glat, brong Hoer."]}, {person:"dënn", length:"laang", texture:"glat", color:"rout", text:["Hatt ass dënn.","Hatt huet laang, glat, rout Hoer."]}, {person:"déck", length:"kuerz", texture:"krauseleg", color:"blond", text:["Hien ass déck.","Hien huet kuerz, krauseleg, blond Hoer."]} ]; const EXERCISES = [ {id:"listen", title:"Lauschter a klick"}, {id:"match", title:"Bild a Wuert"}, {id:"build", title:"Bau d'Persoun"} ]; let exerciseIndex = 0; let audioPlayer = new Audio(); let allowClick = true; const state = { listen: {rounds:[], index:0, options:[], done:false}, match: {rounds:[], index:0, options:[], done:false}, build: {rounds:[], index:0, current:null, selections:{person:null,length:null,texture:null,color:null}, done:false} }; function shuffle(arr){ const a = arr.slice(); for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; } return a; } function sample(arr,n,excludeWord){ return shuffle(arr.filter(x=>x.word!==excludeWord)).slice(0,n); } function flash(el,color){ const prev = el.style.boxShadow; const prevBg = el.style.background; el.style.boxShadow = `0 0 0 6px ${color} inset`; el.style.background = color==="rgba(94,190,109,.35)" ? "rgba(94,190,109,.18)" : "rgba(225,92,92,.16)"; setTimeout(()=>{ el.style.boxShadow = prev; el.style.background = prevBg; },420); } function setPlayEnabled(enabled){ const btn = document.getElementById('play'); btn.style.opacity = enabled ? "1" : ".35"; btn.style.filter = enabled ? "none" : "grayscale(1)"; } function stopAudio(){ audioPlayer.pause(); audioPlayer.currentTime = 0; } function playAudio(src){ if(!src) return; try{ stopAudio(); audioPlayer = new Audio(src); audioPlayer.play().catch(()=>{}); }catch(e){} } function wordData(w){ return VOCAB.find(v=>v.word===w); } function initListen(){ state.listen.rounds = shuffle(VOCAB.filter(v=>v.audio)); state.listen.index = 0; state.listen.done = false; buildListenRound(); } function buildListenRound(){ const s = state.listen; if(s.index >= s.rounds.length){ s.done = true; return; } const current = s.rounds[s.index]; s.options = shuffle([current, ...sample(VOCAB,3,current.word)]); } function initMatch(){ state.match.rounds = shuffle(VOCAB); state.match.index = 0; state.match.done = false; buildMatchRound(); } function buildMatchRound(){ const s = state.match; if(s.index >= s.rounds.length){ s.done = true; return; } const current = s.rounds[s.index]; const distractors = sample(VOCAB,3,current.word).map(x=>x.word); s.options = shuffle([current.word, ...distractors]); } function initBuild(){ state.build.rounds = shuffle(BUILD_PROMPTS); state.build.index = 0; state.build.done = false; buildBuildRound(); } function buildBuildRound(){ const s = state.build; if(s.index >= s.rounds.length){ s.done = true; return; } s.current = s.rounds[s.index]; s.selections = {person:null,length:null,texture:null,color:null}; } function renderDots(){ const wrap = document.getElementById('exerciseDots'); wrap.innerHTML = ""; EXERCISES.forEach((ex,i)=>{ const b = document.createElement('button'); b.type = "button"; b.setAttribute("aria-label", ex.title); b.style.width = "18px"; b.style.height = "18px"; b.style.borderRadius = "999px"; b.style.border = "3px solid #8E73D6"; b.style.background = i===exerciseIndex ? "#B8A3E8" : "rgba(184,163,232,.25)"; b.style.cursor = "pointer"; b.onclick = ()=>{ exerciseIndex = i; render(); }; wrap.appendChild(b); }); } function renderProgress(){ let txt = ""; if(EXERCISES[exerciseIndex].id === "listen"){ txt = state.listen.done ? `${state.listen.rounds.length}/${state.listen.rounds.length}` : `${Math.min(state.listen.index+1, state.listen.rounds.length)}/${state.listen.rounds.length}`; }else if(EXERCISES[exerciseIndex].id === "match"){ txt = state.match.done ? `${state.match.rounds.length}/${state.match.rounds.length}` : `${Math.min(state.match.index+1, state.match.rounds.length)}/${state.match.rounds.length}`; }else{ txt = state.build.done ? `${state.build.rounds.length}/${state.build.rounds.length}` : `${Math.min(state.build.index+1, state.build.rounds.length)}/${state.build.rounds.length}`; } document.getElementById('progressText').textContent = txt; } function renderDone(message){ return ` <div style="display:grid;place-items:center;min-height:54vh;"> <div style="width:min(620px,100%);text-align:center;padding:26px;border-radius:24px;background:rgba(233,221,247,.55);border:3px solid rgba(142,115,214,.35);"> <div style="font-size:clamp(1.5rem,4vw,2.4rem);margin-bottom:10px;">⭐</div> <div style="font-size:clamp(1.4rem,3vw,2rem);line-height:1.15;">${message}</div> </div> </div> `; } function renderListen(){ const s = state.listen; setPlayEnabled(!s.done); if(s.done) return renderDone("Fäerdeg!"); const current = s.rounds[s.index]; return ` <div style="display:flex;flex-direction:column;gap:18px;"> <div style="display:flex;justify-content:center;"> <button id="listenPromptBtn" type="button" style="border:none;background:rgba(184,163,232,.28);border-radius:999px;padding:12px 20px;font-family:inherit;font-size:clamp(1.2rem,2.6vw,1.7rem);cursor:pointer;box-shadow:var(--shadow);">🔊</button> </div> <div id="listenGrid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;"> ${s.options.map((item,idx)=>` <button type="button" class="listenOpt" data-word="${item.word}" style="border:none;background:rgba(255,255,255,.92);border-radius:20px;padding:12px;cursor:pointer;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:10px;"> <img src="${item.img}" alt="${item.word}" style="width:100%;max-width:180px;aspect-ratio:1/1;object-fit:contain;"> </button> `).join("")} </div> </div> `; } function renderMatch(){ const s = state.match; setPlayEnabled(false); if(s.done) return renderDone("Fäerdeg!"); const current = s.rounds[s.index]; return ` <div style="display:flex;flex-direction:column;gap:18px;"> <div style="display:flex;justify-content:center;"> <div style="background:rgba(255,255,255,.92);border-radius:24px;padding:16px;box-shadow:var(--shadow);"> <img src="${current.img}" alt="${current.word}" style="width:min(320px,72vw);max-width:100%;aspect-ratio:1/1;object-fit:contain;"> </div> </div> <div id="matchOptions" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;"> ${s.options.map(word=>` <button type="button" class="matchOpt" data-word="${word}" style="border:none;background:rgba(255,255,255,.95);border-radius:18px;padding:16px 14px;font-family:inherit;font-size:clamp(1.15rem,2.4vw,1.6rem);cursor:pointer;box-shadow:var(--shadow);">${word}</button> `).join("")} </div> </div> `; } function chip(word, selected, dataCat){ return `<button type="button" class="buildChip" data-cat="${dataCat}" data-word="${word}" style="border:none;background:${selected ? 'rgba(184,163,232,.95)' : 'rgba(255,255,255,.95)'};color:${selected ? '#fff' : 'var(--ink)'};border-radius:999px;padding:10px 14px;font-family:inherit;font-size:clamp(1rem,2vw,1.25rem);cursor:pointer;box-shadow:var(--shadow);">${word}</button>`; } function renderBuild(){ const s = state.build; setPlayEnabled(false); if(s.done) return renderDone("Fäerdeg!"); const cur = s.current; const sel = s.selections; return ` <div style="display:flex;flex-direction:column;gap:16px;"> <div style="display:grid;grid-template-columns:minmax(0,1fr);gap:16px;"> <div style="background:rgba(233,221,247,.5);border-radius:22px;padding:16px;box-shadow:var(--shadow);"> <div style="display:flex;flex-direction:column;gap:8px;font-size:clamp(1.1rem,2.2vw,1.45rem);line-height:1.25;"> ${cur.text.map(t=>`<div>${t}</div>`).join("")} </div> </div> <div style="background:rgba(255,255,255,.92);border-radius:22px;padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:14px;"> <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;"> <div style="background:rgba(184,163,232,.15);border-radius:18px;padding:12px;text-align:center;"> <div style="font-size:.95rem;opacity:.75;margin-bottom:6px;">Persoun</div> <div style="font-size:1.3rem;">${sel.person || "—"}</div> </div> <div style="background:rgba(184,163,232,.15);border-radius:18px;padding:12px;text-align:center;"> <div style="font-size:.95rem;opacity:.75;margin-bottom:6px;">Längt</div> <div style="font-size:1.3rem;">${sel.length || "—"}</div> </div> <div style="background:rgba(184,163,232,.15);border-radius:18px;padding:12px;text-align:center;"> <div style="font-size:.95rem;opacity:.75;margin-bottom:6px;">Typ</div> <div style="font-size:1.3rem;">${sel.texture || "—"}</div> </div> <div style="background:rgba(184,163,232,.15);border-radius:18px;padding:12px;text-align:center;"> <div style="font-size:.95rem;opacity:.75;margin-bottom:6px;">Faarf</div> <div style="font-size:1.3rem;">${sel.color || "—"}</div> </div> </div> <div style="display:flex;flex-direction:column;gap:12px;"> <div> <div style="margin-bottom:8px;opacity:.8;">Persoun</div> <div style="display:flex;gap:8px;flex-wrap:wrap;">${PERSON_WORDS.map(w=>chip(w, sel.person===w, "person")).join("")}</div> </div> <div> <div style="margin-bottom:8px;opacity:.8;">Längt</div> <div style="display:flex;gap:8px;flex-wrap:wrap;">${LENGTH_WORDS.map(w=>chip(w, sel.length===w, "length")).join("")}</div> </div> <div> <div style="margin-bottom:8px;opacity:.8;">Typ</div> <div style="display:flex;gap:8px;flex-wrap:wrap;">${TEXTURE_WORDS.map(w=>chip(w, sel.texture===w, "texture")).join("")}</div> </div> <div> <div style="margin-bottom:8px;opacity:.8;">Faarf</div> <div style="display:flex;gap:8px;flex-wrap:wrap;">${COLOR_WORDS.map(w=>chip(w, sel.color===w, "color")).join("")}</div> </div> </div> </div> </div> </div> `; } function bindListen(){ const s = state.listen; const current = s.rounds[s.index]; const promptBtn = document.getElementById('listenPromptBtn'); if(promptBtn) promptBtn.onclick = ()=>playAudio(current.audio); document.querySelectorAll('.listenOpt').forEach(btn=>{ btn.onclick = ()=>{ if(!allowClick) return; if(btn.dataset.word === current.word){ allowClick = false; flash(btn,'rgba(94,190,109,.35)'); setTimeout(()=>{ s.index++; buildListenRound(); allowClick = true; render(); if(!s.done) playAudio(state.listen.rounds[state.listen.index].audio); }, 380); }else{ flash(btn,'rgba(225,92,92,.28)'); } }; }); setTimeout(()=>playAudio(current.audio),120); } function bindMatch(){ const s = state.match; const current = s.rounds[s.index]; document.querySelectorAll('.matchOpt').forEach(btn=>{ btn.onclick = ()=>{ if(!allowClick) return; if(btn.dataset.word === current.word){ allowClick = false; flash(btn,'rgba(94,190,109,.35)'); setTimeout(()=>{ s.index++; buildMatchRound(); allowClick = true; render(); }, 360); }else{ flash(btn,'rgba(225,92,92,.28)'); } }; }); } function checkBuild(){ const s = state.build; const sel = s.selections; const cur = s.current; if(!(sel.person && sel.length && sel.texture && sel.color)) return; const ok = sel.person===cur.person && sel.length===cur.length && sel.texture===cur.texture && sel.color===cur.color; const box = document.getElementById('mainArea'); if(ok){ allowClick = false; flash(box,'rgba(94,190,109,.35)'); setTimeout(()=>{ s.index++; buildBuildRound(); allowClick = true; render(); }, 420); }else{ flash(box,'rgba(225,92,92,.18)'); } } function bindBuild(){ document.querySelectorAll('.buildChip').forEach(btn=>{ btn.onclick = ()=>{ if(!allowClick) return; const cat = btn.dataset.cat; const word = btn.dataset.word; state.build.selections[cat] = word; render(); checkBuild(); }; }); } function render(){ stopAudio(); document.getElementById('gameTitle').textContent = EXERCISES[exerciseIndex].title; renderDots(); renderProgress(); const ex = EXERCISES[exerciseIndex].id; const main = document.getElementById('mainArea'); if(ex==="listen"){ main.innerHTML = renderListen(); bindListen(); }else if(ex==="match"){ main.innerHTML = renderMatch(); bindMatch(); }else{ main.innerHTML = renderBuild(); bindBuild(); } } function resetCurrentExercise(){ const ex = EXERCISES[exerciseIndex].id; if(ex==="listen") initListen(); if(ex==="match") initMatch(); if(ex==="build") initBuild(); render(); } function currentAudio(){ const ex = EXERCISES[exerciseIndex].id; if(ex==="listen" && !state.listen.done){ return state.listen.rounds[state.listen.index].audio; } return null; } initListen(); initMatch(); initBuild(); render(); document.getElementById('prev').onclick = ()=>{ exerciseIndex = (exerciseIndex - 1 + EXERCISES.length) % EXERCISES.length; render(); }; document.getElementById('next').onclick = ()=>{ exerciseIndex = (exerciseIndex + 1) % EXERCISES.length; render(); }; document.getElementById('play').onclick = ()=>{ const src = currentAudio(); if(src) playAudio(src); }; document.getElementById('replay').onclick = ()=>{ resetCurrentExercise(); }; </script> </body> </html>
